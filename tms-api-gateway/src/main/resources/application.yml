server:
  port: 8080

spring:
  application:
    name: tms-api-gateway
  main:
    web-application-type: reactive
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: auth-service
          uri: lb://tms-auth-service
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=0

        - id: auth-oauth2
          uri: lb://tms-auth-service
          predicates:
            - Path=/oauth2/**, /login/oauth2/**
          filters:
            - StripPrefix=0

        - id: core-service-orders
          uri: lb://tms-core-service
          predicates:
            - Path=/api/orders/**
          filters:
            - StripPrefix=0

        - id: core-service-drivers
          uri: lb://tms-core-service
          predicates:
            - Path=/api/drivers/**
          filters:
            - StripPrefix=0

        - id: core-service-vehicles
          uri: lb://tms-core-service
          predicates:
            - Path=/api/vehicles/**
          filters:
            - StripPrefix=0

        - id: core-service-stats
          uri: lb://tms-core-service
          predicates:
            - Path=/api/stats/**
          filters:
            - StripPrefix=0

        - id: routing-service
          uri: lb://tms-routing-service
          predicates:
            - Path=/api/routes/**
          filters:
            - StripPrefix=0

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      password: ${REDIS_PASSWORD:}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka/}
    registry-fetch-interval-seconds: 5
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 5
    lease-expiration-duration-in-seconds: 15

jwt:
  secret: ${JWT_SECRET:default_secret_change_in_production_min_32_chars}
  access-expiration: 900000
  refresh-expiration: 604800000

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
