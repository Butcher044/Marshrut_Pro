# /etc/nginx/sites-available/marshrutpro.conf
# После получения сертификата certbot заменит блок 80→redirect и добавит ssl в блок 443

server {
    listen 80;
    server_name marshrutpro.ru www.marshrutpro.ru;

    # certbot/ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Всё остальное — редирект на HTTPS
    location / {
        return 301 https://marshrutpro.ru$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name marshrutpro.ru www.marshrutpro.ru;

    ssl_certificate     /etc/letsencrypt/live/marshrutpro.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/marshrutpro.ru/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # --- API Gateway (все /api/* и /oauth2/*) ---
    location /api/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Никогда не пропускать X-User-* от клиента
        proxy_set_header   X-User-Id    "";
        proxy_set_header   X-User-Email "";
        proxy_set_header   X-User-Role  "";

        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    location /oauth2/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /login/oauth2/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # --- Frontend (React SPA) ---
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
