server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://api-maps.yandex.ru https://*.maps.yandex.net https://*.yandex.net https://yastatic.net; style-src 'self' 'unsafe-inline' https://*.maps.yandex.net https://fonts.googleapis.com https://yastatic.net; font-src 'self' https://fonts.gstatic.com https://yastatic.net; img-src 'self' data: blob: https://*.maps.yandex.net https://*.yandex.net https://*.yandex.ru https://yastatic.net; connect-src 'self' https://api-maps.yandex.ru https://geocode-maps.yandex.ru https://*.maps.yandex.net https://*.yandex.net https://*.yandex.ru https://yastatic.net; worker-src blob:; frame-ancestors 'none';" always;

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the gateway
    location /api/ {
        proxy_pass http://api-gateway:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Strip any client-injected privilege headers before forwarding
        proxy_set_header X-User-Id "";
        proxy_set_header X-User-Email "";
        proxy_set_header X-User-Role "";
    }

    location /oauth2/ {
        proxy_pass http://api-gateway:8080/oauth2/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /login/oauth2/ {
        proxy_pass http://api-gateway:8080/login/oauth2/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}
